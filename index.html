<style>
  #wrap { padding: 1rem 0; font-family: var(--font-sans); }
  #controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; font-size: 12px; color: var(--color-text-secondary); }
  .axis-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .axis-row-label { font-size: 11px; color: var(--color-text-tertiary); min-width: 28px; }
  .axis-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 4px 10px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); user-select: none; transition: background .15s, border-color .15s; }
  .axis-toggle input { display: none; }
  .axis-toggle.active { background: var(--color-background-primary); border-color: var(--color-border-primary); color: var(--color-text-primary); font-weight: 500; }
  #tooltip { position: absolute; pointer-events: none; opacity: 0; transition: opacity .15s; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 8px 12px; font-size: 12px; max-width: 240px; z-index: 10; line-height: 1.6; }
  canvas { display: block; width: 100%; cursor: crosshair; }
</style>

<div id="wrap">
  <div id="controls">
    <div class="axis-row">
      <span class="axis-row-label">X →</span>
      <label class="axis-toggle active" data-axis="x" data-dim="0"><input type="radio" name="xax" value="0" checked> Tangible ↔ Intangible output</label>
      <label class="axis-toggle" data-axis="x" data-dim="1"><input type="radio" name="xax" value="1"> Community scale ↔ Global agenda</label>
      <label class="axis-toggle" data-axis="x" data-dim="2"><input type="radio" name="xax" value="2"> Change in short-term ↔ Long-term</label>
    </div>
    <div class="axis-row">
      <span class="axis-row-label">Y ↑</span>
      <label class="axis-toggle" data-axis="y" data-dim="0"><input type="radio" name="yax" value="0"> Tangible ↔ Intangible output</label>
      <label class="axis-toggle active" data-axis="y" data-dim="1"><input type="radio" name="yax" value="1" checked> Community scale ↔ Global agenda</label>
      <label class="axis-toggle" data-axis="y" data-dim="2"><input type="radio" name="yax" value="2"> Change in short-term ↔ Long-term</label>
    </div>
  </div>
  <div style="position:relative">
    <canvas id="c"></canvas>
    <div id="tooltip"></div>
  </div>
</div>

<script>
// dims: [tangible(0)-intangible(100), community(0)-global(100), short-change(0)-long-change(100)]
const CMPS = [
  { n:'CMP1',  title:'Health',        dims:[50, 30, 35], note:'Outputs: service interventions, care environments, participatory tools' },
  { n:'CMP2',  title:'Food',          dims:[30, 65, 60], note:'Outputs: fermentation objects, food prototypes, material installations' },
  { n:'CMP3',  title:'Climate',       dims:[80, 90, 85], note:'Outputs: data visualizations, speculative scenarios, spatial narratives' },
  { n:'CMP4',  title:'Disaster',      dims:[45, 28, 75], note:'Outputs: signage, communication systems, evacuation tools' },
  { n:'CMP5',  title:'Culture',       dims:[15, 18, 85], note:'Outputs: crafted objects, material explorations, fabricated artifacts' },
  { n:'CMP6',  title:'Technology',    dims:[85, 60, 20], note:'Outputs: interactive experiences, software, digital artworks' },
  { n:'CMP7',  title:'Entertainment', dims:[75, 45, 40], note:'Outputs: interactive prototypes, experiential formats, participatory events' },
  { n:'CMP8',  title:'Equity',        dims:[70, 75, 65], note:'Outputs: business models, social enterprise proposals, communication' },
  { n:'CMP9',  title:'Law',           dims:[75, 70, 75], note:'Outputs: legal system maps, policy proposals, public communication tools' },
  { n:'CMP10', title:'Education',     dims:[35, 50, 50], note:'Outputs: learning platforms, participatory workshops, spatial tools' },
  { n:'CMP11', title:'Ecosystems',    dims:[50, 55, 82], note:'Outputs: spatial designs, 3D models, material interventions' },
  { n:'CMP12', title:'Governance',    dims:[82, 85, 72], note:'Outputs: data visualizations, civic platforms, narrative tools' },
];

const AXES = [
  { left:'Tangible output', right:'Intangible output' },
  { left:'Community scale', right:'Global agenda' },
  { left:'Change in short-term', right:'Change in long-term' },
];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tip = document.getElementById('tooltip');
let W, H, PAD = 64, INNER_W, INNER_H;
let xDim = 0, yDim = 1;
let hoveredCMP = null;

function isDark() { return matchMedia('(prefers-color-scheme: dark)').matches; }
function toCanvas(x, y) {
  return { cx: PAD + (x/100)*INNER_W, cy: PAD + ((100-y)/100)*INNER_H };
}
function getDims(cmp) {
  return { x: cmp.dims[xDim], y: cmp.dims[yDim] };
}

function syncActive() {
  document.querySelectorAll('.axis-toggle').forEach(label => {
    const dim = parseInt(label.dataset.dim);
    const axis = label.dataset.axis;
    label.classList.toggle('active', axis === 'x' ? dim === xDim : dim === yDim);
  });
}

function draw() {
  const dark = isDark();
  const dotColor = dark ? '#c2c0b6' : '#3d3d3a';
  const dotHovColor = dark ? '#ffffff' : '#000000';
  const textSecondary = dark ? '#8a8880' : '#73726c';
  const axisColor = dark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.12)';
  const gridColor = dark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.05)';

  ctx.clearRect(0, 0, W, H);

  [25,50,75].forEach(v => {
    ctx.strokeStyle = gridColor; ctx.lineWidth = 0.5;
    const {cx} = toCanvas(v,0); ctx.beginPath(); ctx.moveTo(cx,PAD); ctx.lineTo(cx,PAD+INNER_H); ctx.stroke();
    const {cy} = toCanvas(0,v); ctx.beginPath(); ctx.moveTo(PAD,cy); ctx.lineTo(PAD+INNER_W,cy); ctx.stroke();
  });

  ctx.strokeStyle = axisColor; ctx.lineWidth = 1;
  const midX = PAD+INNER_W/2, midY = PAD+INNER_H/2;
  ctx.beginPath(); ctx.moveTo(midX,PAD); ctx.lineTo(midX,PAD+INNER_H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(PAD,midY); ctx.lineTo(PAD+INNER_W,midY); ctx.stroke();

  const ax1 = AXES[xDim], ax2 = AXES[yDim];
  ctx.font = '11px var(--font-sans,sans-serif)';
  ctx.fillStyle = textSecondary;
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('← ' + ax1.left, PAD, PAD - 12);
  ctx.textAlign = 'right';
  ctx.fillText(ax1.right + ' →', PAD+INNER_W, PAD - 12);

  ctx.save();
  ctx.translate(16, PAD+INNER_H);
  ctx.rotate(-Math.PI/2);
  ctx.textAlign = 'left'; ctx.fillText('← ' + ax2.left, 0, 0);
  ctx.restore();
  ctx.save();
  ctx.translate(16, PAD);
  ctx.rotate(-Math.PI/2);
  ctx.textAlign = 'right'; ctx.fillText(ax2.right + ' →', 0, 0);
  ctx.restore();

  CMPS.forEach(cmp => {
    const { x, y } = getDims(cmp);
    const { cx, cy } = toCanvas(x, y);
    const isHov = hoveredCMP === cmp.n;
    const r = 6;

    if (isHov) {
      ctx.beginPath(); ctx.arc(cx, cy, r+5, 0, Math.PI*2);
      ctx.fillStyle = dark ? 'rgba(255,255,255,0.10)' : 'rgba(0,0,0,0.07)';
      ctx.fill();
    }

    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = isHov ? dotHovColor : dotColor;
    ctx.fill();

    ctx.font = isHov ? '500 12px var(--font-sans,sans-serif)' : '12px var(--font-sans,sans-serif)';
    ctx.fillStyle = isHov ? dotHovColor : dotColor;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(cmp.title, cx + r + 5, cy);
  });

  ctx.textBaseline = 'alphabetic';
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width; H = Math.min(480, W * 0.72);
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.height = H+'px';
  ctx.scale(dpr,dpr);
  INNER_W = W-PAD*2; INNER_H = H-PAD*2;
  draw();
}

document.querySelectorAll('input[name="xax"]').forEach(el => {
  el.addEventListener('change', () => {
    xDim = parseInt(el.value);
    if (xDim === yDim) {
      yDim = [0,1,2].find(d => d !== xDim);
      document.querySelector(`input[name="yax"][value="${yDim}"]`).checked = true;
    }
    syncActive(); draw();
  });
});

document.querySelectorAll('input[name="yax"]').forEach(el => {
  el.addEventListener('change', () => {
    yDim = parseInt(el.value);
    if (xDim === yDim) {
      xDim = [0,1,2].find(d => d !== yDim);
      document.querySelector(`input[name="xax"][value="${xDim}"]`).checked = true;
    }
    syncActive(); draw();
  });
});

document.querySelectorAll('.axis-toggle').forEach(label => {
  label.addEventListener('click', () => {
    const input = label.querySelector('input');
    input.checked = true;
    input.dispatchEvent(new Event('change'));
  });
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX-rect.left, my = e.clientY-rect.top;
  let found = null;
  CMPS.forEach(cmp => {
    const {x,y} = getDims(cmp), {cx,cy} = toCanvas(x,y);
    if (Math.sqrt((mx-cx)**2+(my-cy)**2) < 14) found = cmp;
  });
  hoveredCMP = found?.n || null;
  if (found) {
    tip.innerHTML = `<strong style="color:var(--color-text-primary)">${found.n}: ${found.title}</strong><br><span style="color:var(--color-text-secondary);font-size:11px">${found.note}</span>`;
    const tx = e.clientX-rect.left+16;
    tip.style.left = (tx + 200 > W ? tx - 224 : tx) + 'px';
    tip.style.top = (e.clientY-rect.top-10)+'px';
    tip.style.opacity = '1';
    canvas.style.cursor = 'pointer';
  } else {
    tip.style.opacity = '0';
    canvas.style.cursor = 'crosshair';
  }
  draw();
});
canvas.addEventListener('mouseleave', () => { tip.style.opacity='0'; hoveredCMP=null; draw(); });

resize();
window.addEventListener('resize', resize);
matchMedia('(prefers-color-scheme: dark)').addEventListener('change', draw);
</script>
